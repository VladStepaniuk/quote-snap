# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "1a185a141435cf91bd47d2b0c009c945"
name = "QuoteSnap"
application_url = "https://example.com"
embedded = true

[build]
automatically_update_urls_on_dev = true
include_config_on_deploy = true

[webhooks]
api_version = "2026-01"

[access_scopes]
scopes = "read_products,read_customers,write_customers"
optional_scopes = []
use_legacy_install_flow = false

[auth]
redirect_urls = []

[app_proxy]
url = "https://example.com/apps/quotesnap"
subpath = "quotesnap"
prefix = "apps"

[[extensions]]
type = "theme"
name = "storefront-quote"
handle = "storefront-quote"
